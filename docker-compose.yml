version: '3.8'\n\nservices:\n  db:\n    image: postgres:latest\n    restart: always\n    environment:\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n      POSTGRES_DB: trello_clone\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n\n  backend:\n    build: .\n    restart: always\n    ports:\n      - '5000:5000'\n    environment:\n      DATABASE_URL: postgres://user:password@db:5432/trello_clone\n    depends_on:\n      - db\n\nvolumes:\n  postgres_data: